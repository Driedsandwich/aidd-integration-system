name: Auto-tag Registry entries

on:
  schedule:
    - cron: '30 1 * * 1'
  workflow_dispatch:
  workflow_run:
    workflows: ["Build Notion registry (weekly)"]
    types: [completed]

permissions:
  contents: read

jobs:
  autotag:
    runs-on: ubuntu-latest
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      REGISTRY_DB: 28886723-2af9-81ff-8891-e62c1cdb9b26
    steps:
      - name: Ensure jq
        run: |
          if ! command -v jq >/dev/null 2>&1; then sudo apt-get update -y && sudo apt-get install -y jq; fi

      - name: Fetch registry pages
        shell: bash
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${NOTION_TOKEN}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            https://api.notion.com/v1/databases/${REGISTRY_DB}/query \
            -d '{"page_size":100}' > reg.json

      - name: Apply simple auto-tag rules
        shell: bash
        run: |
          set -euo pipefail
          jq -r '.results[] | @base64' reg.json > items
          while IFS= read -r line; do
            item=$(echo "$line" | base64 -d)
            pid=$(echo "$item" | jq -r '.id')
            name=$(echo "$item" | jq -r '.properties.Name.title[0].plain_text // ""')
            cur=$(echo "$item" | jq -r '.properties.tag.select.name // ""')
            atag=$(echo "$item" | jq -r '.properties.autoTag.select.name // ""')
            # rule: if tag empty and name contains "Project" => Projects, Knowledge keywords => Knowledge
            if [ -z "$cur" ]; then
              if echo "$name" | grep -iq 'project'; then nm=Projects
              elif echo "$name" | grep -iq 'task\|todo'; then nm=Tasks
              elif echo "$name" | grep -iq 'guide\|docs\|knowledge'; then nm=Knowledge
              elif echo "$name" | grep -iq 'log\|audit'; then nm=Logs
              elif echo "$name" | grep -iq 'metric\|kpi'; then nm=Metrics
              else nm=Other; fi
              # write to autoTag only（既存tagは変更しない）
              jq -n --arg nm "$nm" '{"properties":{"autoTag":{"select":{"name":$nm}}}}' > p.json
              curl -sS -X PATCH -H "Authorization: Bearer ${NOTION_TOKEN}" -H "Notion-Version: 2022-06-28" -H "Content-Type: application/json" https://api.notion.com/v1/pages/$pid --data-binary @p.json >/dev/null || true
            fi
          done < items

