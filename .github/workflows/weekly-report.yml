name: Weekly Notion sync report

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  weekly:
    runs-on: ubuntu-latest
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      LOG_DB: 28886723-2af9-8177-924b-ea981a2f6dfa
      METRICS_DB: 28886723-2af9-81eb-99de-fbb6e1af2dc5
    steps:
      - name: Ensure jq
        run: |
          if ! command -v jq >/dev/null 2>&1; then sudo apt-get update -y && sudo apt-get install -y jq; fi

      - name: Query last 7 days logs
        id: q
        shell: bash
        run: |
          FROM=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          WEEK=$(date -u +%G-W%V)
          echo "now=$NOW" >> $GITHUB_OUTPUT
          echo "week=$WEEK" >> $GITHUB_OUTPUT
          QUERY=$(jq -n --arg d "$FROM" '{"filter":{"and":[{"property":"when","date":{"on_or_after":$d}}]},"page_size":200}')
          curl -sS -X POST \
            -H "Authorization: Bearer ${NOTION_TOKEN}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            https://api.notion.com/v1/databases/${LOG_DB}/query \
            -d "$QUERY" > logs.json

      - name: Aggregate
        id: agg
        shell: bash
        run: |
          TOTAL=$(jq '.results | length' logs.json)
          SUCCESS=$(jq '[.results[].properties.result.select.name] | map(select(.=="success")) | length' logs.json)
          FAILURE=$((TOTAL - SUCCESS))
          C2=$(jq '[.results[].properties.httpCode.number] | map(select(.>=200 and .<300)) | length' logs.json)
          C4=$(jq '[.results[].properties.httpCode.number] | map(select(.>=400 and .<500)) | length' logs.json)
          C5=$(jq '[.results[].properties.httpCode.number] | map(select(.>=500 and .<600)) | length' logs.json)
          if [ "$TOTAL" -gt 0 ]; then RATE=$(python3 - <<PY
total=$TOTAL; success=$SUCCESS
print(round(100*success/total,2))
PY
); else RATE=100; fi
          echo "total=$TOTAL"       >> $GITHUB_OUTPUT
          echo "success=$SUCCESS"    >> $GITHUB_OUTPUT
          echo "failure=$FAILURE"    >> $GITHUB_OUTPUT
          echo "code2xx=$C2"         >> $GITHUB_OUTPUT
          echo "code4xx=$C4"         >> $GITHUB_OUTPUT
          echo "code5xx=$C5"         >> $GITHUB_OUTPUT
          echo "successRate=$RATE"   >> $GITHUB_OUTPUT

      - name: Upsert weekly report
        shell: bash
        run: |
          WEEK='${{ steps.q.outputs.week }}'
          NOW='${{ steps.q.outputs.now }}'
          NAME="Weekly Report $WEEK"
          # find
          Q=$(jq -n --arg name "$NAME" '{"filter":{"property":"Name","title":{"equals":$name}},"page_size":1}')
          RES=$(curl -sS -X POST -H "Authorization: Bearer ${NOTION_TOKEN}" -H "Notion-Version: 2022-06-28" -H "Content-Type: application/json" https://api.notion.com/v1/databases/${METRICS_DB}/query -d "$Q")
          PID=$(echo "$RES" | jq -r '.results[0].id // ""')
          jq -n \
            --arg name "$NAME" --arg now "$NOW" \
            --argjson total ${'{'}{ steps.agg.outputs.total }{'}'} \
            --argjson success ${'{'}{ steps.agg.outputs.success }{'}'} \
            --argjson failure ${'{'}{ steps.agg.outputs.failure }{'}'} \
            --argjson srate ${'{'}{ steps.agg.outputs.successRate }{'}'} \
            --argjson c2 ${'{'}{ steps.agg.outputs.code2xx }{'}'} \
            --argjson c4 ${'{'}{ steps.agg.outputs.code4xx }{'}'} \
            --argjson c5 ${'{'}{ steps.agg.outputs.code5xx }{'}'} \
            '{
              "properties":{
                "Name":{"title":[{"text":{"content":$name}}]},
                "lastUpdated":{"date":{"start":$now}},
                "total":{"number":$total},
                "success":{"number":$success},
                "failure":{"number":$failure},
                "successRate":{"number":$srate},
                "code2xx":{"number":$c2},
                "code4xx":{"number":$c4},
                "code5xx":{"number":$c5}
              }
            }' > props.json
          if [ -n "$PID" ]; then
            curl -sS -X PATCH -H "Authorization: Bearer ${NOTION_TOKEN}" -H "Notion-Version: 2022-06-28" -H "Content-Type: application/json" https://api.notion.com/v1/pages/$PID --data-binary @props.json >/dev/null || true
          else
            jq -n --arg db "$METRICS_DB" --slurpfile p props.json '{"parent":{"database_id":$db},"properties":$p[0]}' > create.json
            curl -sS -X POST -H "Authorization: Bearer ${NOTION_TOKEN}" -H "Notion-Version: 2022-06-28" -H "Content-Type: application/json" https://api.notion.com/v1/pages --data-binary @create.json >/dev/null || true
          fi

