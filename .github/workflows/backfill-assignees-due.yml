name: Backfill ghAssignees/ghDue (Notion Tasks)

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Max pages to backfill"
        required: false
        default: '50'

permissions:
  contents: read

jobs:
  backfill:
    runs-on: ubuntu-latest
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      TASKS_DB: ${{ secrets.NOTION_TASKS_DB != '' && secrets.NOTION_TASKS_DB || secrets.NOTION_DB_TASKS_ID }}
    steps:
      - name: Ensure jq
        run: |
          if ! command -v jq >/dev/null 2>&1; then sudo apt-get update -y && sudo apt-get install -y jq; fi

      - name: Query recent tasks
        id: q
        shell: bash
        run: |
          LIMIT='${{ github.event.inputs.limit }}'
          [ -z "$LIMIT" ] && LIMIT=50
          QUERY=$(jq -n --argjson n "$LIMIT" '{"page_size":$n,"sorts":[{"timestamp":"last_edited_time","direction":"descending"}]}')
          curl -sS -X POST \
            -H "Authorization: Bearer ${NOTION_TOKEN}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            https://api.notion.com/v1/databases/${TASKS_DB}/query \
            -d "$QUERY" > tasks.json
          echo "count=$(jq '.results | length' tasks.json)" >> $GITHUB_OUTPUT

      - name: Backfill loop
        shell: bash
        run: |
          set -euo pipefail
          jq -r '.results[] | @base64' tasks.json > items
          while IFS= read -r line; do
            item=$(echo "$line" | base64 -d)
            pid=$(echo "$item" | jq -r '.id')
            num=$(echo "$item" | jq -r '.properties.ghIssueNumber.number // 0')
            repo=$(echo "$item" | jq -r '.properties.ghRepo.rich_text[0].plain_text // ""')
            hasAssignees=$(echo "$item" | jq -r '.properties.ghAssignees.rich_text[0].plain_text // ""')
            hasDue=$(echo "$item" | jq -r '.properties.ghDue.date.start // ""')
            if [ -z "$repo" ] || [ "$num" = "0" ]; then continue; fi
            if [ -n "$hasAssignees" ] && [ -n "$hasDue" ]; then continue; fi
            owner_repo="$repo"
            # fetch GH issue/PR JSON
            api="https://api.github.com/repos/${owner_repo}/issues/${num}"
            res=$(curl -sS "$api")
            assignees=$(echo "$res" | jq -r '[.assignees[].login] | join(", ")')
            due=$(echo "$res" | jq -r '.milestone.due_on // ""')
            [ -z "$assignees" ] && [ -z "$due" ] && continue
            if [ -n "$due" ]; then due_json=$(jq -n --arg d "$due" '{start:$d}'); else due_json=null; fi
            jq -n --arg a "$assignees" --argjson d "$due_json" '{"properties":{"ghAssignees":{"rich_text":[{"text":{"content":$a}}]},"ghDue":{"date":$d}}}' > p.json
            curl -sS -X PATCH \
              -H "Authorization: Bearer ${NOTION_TOKEN}" \
              -H "Notion-Version: 2022-06-28" \
              -H "Content-Type: application/json" \
              https://api.notion.com/v1/pages/$pid --data-binary @p.json >/dev/null || true
          done < items
