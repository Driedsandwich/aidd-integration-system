name: GitHub → Notion (Issues/PR sync)

on:
  issues:
    types: [opened, edited, closed, reopened]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, edited, closed, reopened]
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pull-requests: read

concurrency:
  group: gh-to-notion-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_TASKS_DB: ${{ secrets.NOTION_TASKS_DB != '' && secrets.NOTION_TASKS_DB || secrets.NOTION_DB_TASKS_ID }}
    steps:
      - name: Ensure jq is available
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y jq
          fi
      - name: Build Notion payload
        id: build
        shell: bash
        run: |
          EVENT_NAME="${{ github.event_name }}"
          REPO="${{ github.repository }}"
          if [ "$EVENT_NAME" = "issues" ] || [ "$EVENT_NAME" = "issue_comment" ]; then
            TITLE='${{ github.event.issue.title }}'
            NUMBER='${{ github.event.issue.number }}'
            STATE='${{ github.event.issue.state }}'
            URL='${{ github.event.issue.html_url }}'
            ASSIGNEES_JSON='${{ toJson(github.event.issue.assignees.*.login) }}'
            DUE='${{ github.event.issue.milestone.due_on }}'
          else
            TITLE='${{ github.event.pull_request.title }}'
            NUMBER='${{ github.event.pull_request.number }}'
            STATE='${{ github.event.pull_request.state }}'
            URL='${{ github.event.pull_request.html_url }}'
            ASSIGNEES_JSON='${{ toJson(github.event.pull_request.assignees.*.login) }}'
            DUE='${{ github.event.pull_request.milestone.due_on }}'
          fi
          # normalize assignees -> comma-separated text
          AS_TEXT=$(echo "${ASSIGNEES_JSON:-[]}" | jq -r 'if type=="array" then join(", ") else "" end')
          # due date json (null or {start: ...})
          if [ -n "$DUE" ]; then DUE_JSON=$(jq -n --arg d "$DUE" '{start:$d}'); else DUE_JSON=null; fi
          # properties only (for update)
          cat > props.json << EOF
          {
            "ghRepo": { "rich_text": [{ "text": { "content": "${REPO}" } }] },
            "ghIssueNumber": { "number": ${NUMBER} },
            "ghState": { "select": { "name": "${STATE}" } },
            "ghUrl": { "url": "${URL}" },
            "ghAssignees": { "rich_text": [{ "text": { "content": "${AS_TEXT}" } }] },
            "ghDue": { "date": ${DUE_JSON} }
          }
          EOF
          cat > payload.json << EOF
          {
            "parent": { "database_id": "${NOTION_TASKS_DB}" },
            "properties": {
              "Name": { "title": [{ "text": { "content": "${TITLE}" } }] },
              "ghRepo": { "rich_text": [{ "text": { "content": "${REPO}" } }] },
              "ghIssueNumber": { "number": ${NUMBER} },
              "ghState": { "select": { "name": "${STATE}" } },
              "ghUrl": { "url": "${URL}" },
              "ghAssignees": { "rich_text": [{ "text": { "content": "${AS_TEXT}" } }] },
              "ghDue": { "date": ${DUE_JSON} }
            }
          }
          EOF
          echo "payload=$(cat payload.json | tr -d '\n')" >> $GITHUB_OUTPUT
          echo "props=$(cat props.json | tr -d '\n')" >> $GITHUB_OUTPUT

      - name: Query existing task by ghIssueNumber
        id: q
        shell: bash
        run: |
          EVENT_NAME="${{ github.event_name }}"
          if [ "$EVENT_NAME" = "issues" ] || [ "$EVENT_NAME" = "issue_comment" ]; then
            N='${{ github.event.issue.number }}'
          else
            N='${{ github.event.pull_request.number }}'
          fi
          QUERY=$(printf '{"filter":{"property":"ghIssueNumber","number":{"equals":%s}}}' "$N")
          RES=$(curl -sS -X POST \
            -H "Authorization: Bearer ${NOTION_TOKEN}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            https://api.notion.com/v1/databases/${NOTION_TASKS_DB}/query \
            -d "${QUERY}") || true
          PID=$(echo "$RES" | jq -r '.results[0].id // ""')
          echo "page_id=$PID" >> $GITHUB_OUTPUT

      - name: Upsert Notion task (with debug)
        shell: bash
        run: |
          echo "page_id='${{ steps.q.outputs.page_id }}'"
          # Recreate payload files from step outputs to avoid inline quoting issues
          echo '${{ steps.build.outputs.props }}' > props.json
          echo '{"properties": '$(cat props.json)'}' > update.json
          echo '${{ steps.build.outputs.payload }}' > payload.json

          if [ -n "${{ steps.q.outputs.page_id }}" ]; then
            # update (use file payload to avoid bash quoting pitfalls)
            RES=$(curl -sS -w "\n%{http_code}" -X PATCH \
              -H "Authorization: Bearer ${NOTION_TOKEN}" \
              -H "Notion-Version: 2022-06-28" \
              -H "Content-Type: application/json" \
              https://api.notion.com/v1/pages/${{ steps.q.outputs.page_id }} \
              --data-binary @update.json)
          else
            # create
            RES=$(curl -sS -w "\n%{http_code}" -X POST \
              -H "Authorization: Bearer ${NOTION_TOKEN}" \
              -H "Notion-Version: 2022-06-28" \
              -H "Content-Type: application/json" \
              https://api.notion.com/v1/pages \
              --data-binary @payload.json)
          fi
          CODE=$(echo "$RES" | tail -n1)
          BODY=$(echo "$RES" | sed '$d')
          echo "HTTP $CODE"; echo "$BODY" | jq '.' || echo "$BODY"

      - name: Summary
        run: |
          echo "Synced ${{ github.event_name }} to Notion DB ${NOTION_TASKS_DB} (if secrets set)."

      - name: Write sync log to Notion
        if: always()
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          LOG_DB: 28886723-2af9-8177-924b-ea981a2f6dfa
        shell: bash
        run: |
          NAME="${{ github.workflow }}"
          EVENT="${{ github.event_name }}"
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          RESULT="${{ job.status }}"
          HTTP=$(grep '^HTTP ' -R $GITHUB_WORKSPACE -n || true)
          CODE=$(echo "$HTTP" | sed -n 's/.*HTTP //p' | tail -n1)
          [ -z "$CODE" ] && CODE=0
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ISSUE_URL="${{ github.event.issue.html_url || github.event.pull_request.html_url || '' }}"
          REPO_NAME="${{ github.repository }}"
          ISSUE_NUMBER="${{ github.event.issue.number || github.event.pull_request.number || 0 }}"
          cat > log.json <<EOF
          {"parent":{"database_id":"$LOG_DB"},
           "properties":{
             "Name":{"title":[{"text":{"content":"$NAME"}}]},
             "source":{"select":{"name":"GitHub Actions"}},
             "when":{"date":{"start":"$NOW"}},
             "result":{"select":{"name":"$RESULT"}},
             "httpCode":{"number":$CODE},
             "ghEvent":{"rich_text":[{"text":{"content":"$EVENT"}}]},
             "runUrl":{"url":"$RUN_URL"},
             "ghUrl":{"url":"$ISSUE_URL"},
             "ghRepo":{"rich_text":[{"text":{"content":"$REPO_NAME"}}]},
             "ghIssueNumber":{"number":$ISSUE_NUMBER}
           }
          }
          EOF
          curl -sS -X POST \
            -H "Authorization: Bearer ${NOTION_TOKEN}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            https://api.notion.com/v1/pages \
            --data-binary @log.json >/dev/null || true

      - name: Aggregate daily metrics (fallback one-shot)
        if: always()
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          LOG_DB: 28886723-2af9-8177-924b-ea981a2f6dfa
          METRICS_DB: 28886723-2af9-81eb-99de-fbb6e1af2dc5
        shell: bash
        run: |
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          FROM=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          DAY=$(date -u +%Y-%m-%d)
          QUERY=$(printf '{"filter":{"and":[{"property":"when","date":{"on_or_after":"%s"}}]},"page_size":100}' "$FROM")
          curl -sS -X POST \
            -H "Authorization: Bearer ${NOTION_TOKEN}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            https://api.notion.com/v1/databases/${LOG_DB}/query \
            -d "$QUERY" > logs.json || exit 0
          TOTAL=$(jq '.results | length' logs.json)
          SUCCESS=$(jq '[.results[].properties.result.select.name] | map(select(.=="success")) | length' logs.json)
          FAILURE=$((TOTAL - SUCCESS))
          C2=$(jq '[.results[].properties.httpCode.number] | map(select(.>=200 and .<300)) | length' logs.json)
          C4=$(jq '[.results[].properties.httpCode.number] | map(select(.>=400 and .<500)) | length' logs.json)
          C5=$(jq '[.results[].properties.httpCode.number] | map(select(.>=500 and .<600)) | length' logs.json)
          if [ "$TOTAL" -gt 0 ]; then
            RATE=$(python3 - <<PY
total=$TOTAL; success=$SUCCESS
print(round(100*success/total,2))
PY
)
          else
            RATE=100
          fi
          # Upsert by date
          Q=$(printf '{"filter":{"property":"date","date":{"equals":"%s"}},"page_size":1}' "$DAY")
          RES=$(curl -sS -X POST \
            -H "Authorization: Bearer ${NOTION_TOKEN}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            https://api.notion.com/v1/databases/${METRICS_DB}/query \
            -d "$Q")
          PID=$(echo "$RES" | jq -r '.results[0].id // ""')
          NAME="Daily Metrics $DAY"
          jq -n --arg name "$NAME" --arg day "$DAY" --arg now "$NOW" \
            --argjson total "$TOTAL" --argjson success "$SUCCESS" --argjson failure "$FAILURE" \
            --argjson srate "$RATE" --argjson c2 "$C2" --argjson c4 "$C4" --argjson c5 "$C5" \
            '{
              "Name":{"title":[{"text":{"content":$name}}]},
              "date":{"date":{"start":$day}},
              "lastUpdated":{"date":{"start":$now}},
              "total":{"number":$total},
              "success":{"number":$success},
              "failure":{"number":$failure},
              "successRate":{"number":$srate},
              "code2xx":{"number":$c2},
              "code4xx":{"number":$c4},
              "code5xx":{"number":$c5}
            }' > props.json
          if [ -n "$PID" ]; then
            curl -sS -X PATCH -H "Authorization: Bearer ${NOTION_TOKEN}" -H "Notion-Version: 2022-06-28" -H "Content-Type: application/json" \
              https://api.notion.com/v1/pages/$PID --data-binary @<(jq -n --argfile p props.json '{"properties":$p}') >/dev/null || true
          else
            curl -sS -X POST -H "Authorization: Bearer ${NOTION_TOKEN}" -H "Notion-Version: 2022-06-28" -H "Content-Type: application/json" \
              https://api.notion.com/v1/pages --data-binary @<(jq -n --arg db "$METRICS_DB" --argfile p props.json '{"parent":{"database_id":$db},"properties":$p}') >/dev/null || true
          fi


