name: GitHub → Notion (Issues/PR sync)

on:
  issues:
    types: [opened, edited, closed, reopened]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, edited, closed, reopened]

permissions:
  contents: read
  issues: read
  pull-requests: read

concurrency:
  group: gh-to-notion-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    if: ${{ secrets.NOTION_TOKEN != '' && secrets.NOTION_TASKS_DB != '' }}
    runs-on: ubuntu-latest
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_TASKS_DB: ${{ secrets.NOTION_TASKS_DB }}
    steps:
      - name: Build Notion payload
        id: build
        shell: bash
        run: |
          EVENT_NAME="${{ github.event_name }}"
          REPO="${{ github.repository }}"
          if [ "$EVENT_NAME" = "issues" ] || [ "$EVENT_NAME" = "issue_comment" ]; then
            TITLE='${{ github.event.issue.title }}'
            NUMBER='${{ github.event.issue.number }}'
            STATE='${{ github.event.issue.state }}'
            URL='${{ github.event.issue.html_url }}'
          else
            TITLE='${{ github.event.pull_request.title }}'
            NUMBER='${{ github.event.pull_request.number }}'
            STATE='${{ github.event.pull_request.state }}'
            URL='${{ github.event.pull_request.html_url }}'
          fi
          cat > payload.json << EOF
          {
            "parent": { "database_id": "${NOTION_TASKS_DB}" },
            "properties": {
              "Name": { "title": [{ "text": { "content": "${TITLE}" } }] },
              "ghRepo": { "rich_text": [{ "text": { "content": "${REPO}" } }] },
              "ghNumber": { "number": ${NUMBER} },
              "ghState": { "select": { "name": "${STATE}" } },
              "ghUrl": { "url": "${URL}" }
            }
          }
          EOF
          echo "payload=$(cat payload.json | tr -d '\n')" >> $GITHUB_OUTPUT

      - name: Create/update Notion page (best-effort)
        shell: bash
        run: |
          # NOTE: This creates a page on every relevant event. Idempotency can be
          # achieved by adding a unique key property and querying before insert.
          curl -sS -X POST \
            -H "Authorization: Bearer ${NOTION_TOKEN}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            https://api.notion.com/v1/pages \
            -d "${{ steps.build.outputs.payload }}" \
            | jq -r '.id // "ok"' >/dev/null || true

      - name: Summary
        run: |
          echo "Synced ${{ github.event_name }} to Notion DB ${NOTION_TASKS_DB} (if secrets set)."


